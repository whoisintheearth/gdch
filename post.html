<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDCH 게시글 | GDCH</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="postShell">
      <aside class="sidebar" aria-label="주요 메뉴">
        <a class="brand" href="index.html" aria-label="GDCH 홈">
          <span class="brand-mark">G</span>
          <span>
            <strong>GDCH</strong>
            <small>GDCH lounge</small>
          </span>
        </a>
        <section class="profile-card" aria-label="내 프로필">
          <div class="profile-avatar" id="profileAvatar">나</div>
          <div>
            <span class="eyebrow">내 프로필</span>
            <h2 id="profileName">로그인 사용자</h2>
            <p id="profileGroup">소속 확인 중</p>
          </div>
        </section>

        <nav class="nav-list">
          <a class="nav-item" href="index.html" title="목록으로">
            <span class="icon">⌂</span><span>내 피드</span>
          </a>
          <button class="nav-item active" type="button" title="상세글">
            <span class="icon">▣</span><span>상세글</span>
          </button>
        </nav>

        <section class="identity-card">
          <img src="assets/workplace-panel.png" alt="업무용 책상과 노트북 일러스트" />
          <div>
            <span class="eyebrow">익명 인증 상태</span>
            <h2 id="identityTitle">인증 확인 중</h2>
            <p id="identityText">가입 소속과 관계없이 전체 글을 확인할 수 있습니다.</p>
          </div>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="detailTitle">GDCH 게시글</p>
            <h1>상세글</h1>
          </div>
          <div class="topbar-actions">
            <a class="ghost-button link-button" href="index.html">목록으로</a>
            <button class="ghost-button" type="button" id="logoutButton">로그아웃</button>
          </div>
        </header>

        <section class="content-grid detail-page-grid">
          <div class="feed" id="postDetail" aria-live="polite"></div>

          <aside class="right-rail" aria-label="게시글 정보">
            <section class="panel">
              <h2>글 정보</h2>
              <div class="metric-list">
                <div><strong id="detailLikes">0</strong><span>좋아요</span></div>
                <div><strong id="detailComments">0</strong><span>댓글</span></div>
                <div><strong id="detailGroup">-</strong><span>소속</span></div>
              </div>
            </section>
            <section class="panel compact">
              <h2>댓글 안내</h2>
              <p>댓글은 현재 브라우저의 시뮬레이션 데이터에 저장됩니다.</p>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <script src="app-data.js"></script>
    <script src="post.js"></script>
  </body>
</html>
